board = seeed-xiao-afruitnrf52-nrf52840
framework = arduino
custom_variant = xiao_nrf52840_lowpower
lib_archive = no
build_flags =
	${env.build_flags}
	-fexceptions
	-DBOARD_MODEL=BOARD_XIAO_NRF52840
	-DDEFAULT_POWER_MODE=POWER_MODE_LOW_POWER
	-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_POOL_ALLOCATOR
	-DRNS_HEAP_POOL_BUFFER_SIZE=204800
	-DRNS_USE_ALLOCATOR=1
	-DRNS_USE_TLSF=1
	-Wl,--allow-multiple-definition
build_unflags = -fno-exceptions
lib_deps =
	${env.lib_deps}
	XPowersLib@^0.2.1
	https://github.com/attermann/microReticulum.git